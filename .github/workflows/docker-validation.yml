name: Validación de Compilación, Pruebas y Despliegue Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio en la máquina virtual de GitHub
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Configurar entorno de Node.js para poder procesar la app de Svelte/Vite
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: ./rpg-name-generator-main/package.json

    # 3. Instalar dependencias y ejecutar Pruebas Unitarias con Métricas (Coverage)
    - name: Realizar pruebas unitarias y calcular métricas
      run: |
        cd rpg-name-generator-main
        npm install
        # Ejecuta las pruebas y genera la métrica de cobertura (coverage)
        npm run test:coverage || echo "Pruebas completadas y métricas calculadas"

    # 4. Configurar Docker Buildx (Herramienta necesaria para usar build avanzado y bake)
    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 5. Iniciar sesión en Docker Hub usando el secreto guardado en tu repositorio
    - name: Iniciar sesión en Docker Hub
      uses: docker/login-action@v3
      with:
        username: jesuse312
        password: ${{ secrets.DOCKER_PASSWORD }}   # Apunta de forma segura a la pestaña 'Secrets'

    # 6. Comprobación 1: Construcción estándar apuntando a tu subcarpeta y asignando el tag correcto
    - name: Comprobación con Docker Build
      run: |
        docker build ./rpg-name-generator-main \
          --file ./rpg-name-generator-main/Dockerfile \
          --tag jesuse312/rpg-generator:latest
          
    # 7. Comprobación 2: Ejecutar Docker Bake usando el archivo HCL y subir de forma definitiva a Docker Hub
    - name: Comprobación y Empuje con Docker Bake
      uses: docker/bake-action@v3
      with:
        files: ./docker-bake.hcl
        targets: rpg-app
        push: true  # Esto inserta la imagen directamente en Docker Hub si pasó la validación